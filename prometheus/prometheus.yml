global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/redis_rules.yml

scrape_configs:
  - job_name: 'gaming-leaderboard'
    static_configs:
      - targets: ['app:8080']
      
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
      
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']
